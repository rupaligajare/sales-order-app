spring.application.name=portal
# Render and other PaaS providers inject PORT at runtime
server.port=${PORT:8080}

# JDE Orchestrator forwarding config
jde.orchestrator.enabled=${JDE_ORCH_ENABLED:true}
jde.orchestrator.url=${JDE_ORCH_URL:}
jde.orchestrator.token=${JDE_ORCH_TOKEN:}
jde.orchestrator.username=${JDE_ORCH_USERNAME:}
jde.orchestrator.password=${JDE_ORCH_PASSWORD:}
